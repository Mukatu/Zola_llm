name: zolaos

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-dev}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}

services:

  # ============================================================================
  # PostgreSQL + pgvector — source unique de vérité (relationnel + vectoriel)
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zolaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zolaos}
      # Le superuser sert UNIQUEMENT à exécuter l'init.
      # Les rôles applicatifs (migrator, app, agents) sont créés par 01_init_schemas.sql.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_MIGRATIONS}
      # Variables consommées par les scripts d'init (psql -v)
      PWD_MIGRATOR: ${POSTGRES_PASSWORD_MIGRATIONS}
      PWD_APP: ${POSTGRES_PASSWORD_APP}
      PWD_HEALTH: ${POSTGRES_PASSWORD_HEALTH}
      PWD_LEGAL: ${POSTGRES_PASSWORD_LEGAL}
      PWD_ERP: ${POSTGRES_PASSWORD_ERP}
      PWD_CODE: ${POSTGRES_PASSWORD_CODE}
      PWD_AUDIT_W: ${POSTGRES_PASSWORD_AUDIT_W}
      PWD_AUDIT_R: ${POSTGRES_PASSWORD_AUDIT_R}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/00_bootstrap.sh:/docker-entrypoint-initdb.d/00_bootstrap.sh:ro
      - ./infra/postgres/01_init_schemas.sql:/infra/01_init_schemas.sql:ro
      - ./infra/postgres/02_audit_log.sql:/infra/02_audit_log.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-zolaos}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [zolaos-net]

  # ============================================================================
  # Redis — cache + broker Dramatiq
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: zolaos-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [zolaos-net]

  # ============================================================================
  # MinIO — stockage objet S3-compatible (PDFs, contrats générés, CVs, etc.)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: zolaos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [zolaos-net]

  # ============================================================================
  # Ollama — serveur LLM local
  # ----------------------------------------------------------------------------
  # ⚠️ DÉSACTIVÉ EN DEV (Strix Halo / Radeon 8060S) : sous Docker Desktop Windows,
  # le GPU AMD intégré n'est pas exposable aux conteneurs (ni NVIDIA passthrough
  # ni ROCm pour iGPU mobile RDNA 3.5). L'image officielle ollama/ollama tourne
  # en CPU pur dans ce contexte → latence prohibitive (35-50 s/requête).
  #
  # En dev : Ollama tourne EN NATIF sur Windows (Vulkan → Radeon 8060S, 64 Go
  # VRAM unifiée). Les conteneurs y accèdent via host.docker.internal:11434.
  #
  # En prod Linux (serveur AMD APU ou GPU NVIDIA) : décommenter ce bloc et
  # configurer le runtime adapté (nvidia-container-toolkit ou ROCm).
  # ============================================================================
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: zolaos-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   environment:
  #     OLLAMA_KEEP_ALIVE: "30m"
  #     OLLAMA_NUM_PARALLEL: "2"
  #   # Décommenter sur machine avec GPU NVIDIA :
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks: [zolaos-net]

  # ============================================================================
  # Application ZolaOS
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zolaos:dev
    container_name: zolaos-app
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *common-env
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      # Backend LLM local : llama.cpp (serveur OpenAI-compatible) en natif Windows
      # avec Vulkan/Radeon 8060S. host.docker.internal résout vers l'hôte.
      # Routeur + brigade (8B) sur 11434, Planning (70B) sur 11435 (à activer).
      # En prod Linux : remplacer par l'IP du serveur d'inférence ou un service
      # interne au compose (cf. service llama-server commenté plus bas).
      LLM_BACKEND: ${LLM_BACKEND:-llamacpp}
      LLM_HOST_ROUTER: ${LLM_HOST_ROUTER:-http://host.docker.internal:11434}
      LLM_HOST_CORE: ${LLM_HOST_CORE:-http://host.docker.internal:11435}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      # Force la résolution de host.docker.internal sur Linux (no-op sur Windows).
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    networks: [zolaos-net]

  # ============================================================================
  # Caddy — reverse proxy + TLS automatique (utile dès staging)
  # ============================================================================
  caddy:
    image: caddy:2-alpine
    container_name: zolaos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks: [zolaos-net]
    profiles: ["with-proxy"]   # désactivé par défaut en dev : docker compose --profile with-proxy up

  # ============================================================================
  # Prometheus + Grafana — observabilité
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: zolaos-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [zolaos-net]
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:latest
    container_name: zolaos-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [zolaos-net]
    profiles: ["observability"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # ollama_data: désactivé — Ollama tourne en natif Windows (cf. service ollama commenté)
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  zolaos-net:
    driver: bridge
